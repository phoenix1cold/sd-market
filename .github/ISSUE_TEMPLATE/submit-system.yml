name: "Publish a system"
description: "Add your system to the community market"
title: "[system] "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in this form and the bot will validate your package and add the system to the catalog automatically. Export the package in Foundry: Market -> "Export my system".
  - type: input
    id: name
    attributes:
      label: "Name"
      placeholder: "Dark Fantasy"
    validations:
      required: true
  - type: input
    id: sysid
    attributes:
      label: "ID"
      description: "Lowercase latin letters, digits and hyphens only. Submitting again with the same ID updates the system."
      placeholder: "dark-fantasy"
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: "Author"
      description: "Defaults to your GitHub username if empty"
  - type: input
    id: version
    attributes:
      label: "Version"
      placeholder: "1.0.0"
  - type: textarea
    id: description
    attributes:
      label: "Description"
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: "Tags"
      description: "Comma-separated"
      placeholder: "fantasy, horror"
  - type: input
    id: repo
    attributes:
      label: "System repository (for likes/stars)"
      placeholder: "https://github.com/user/repo"
  - type: input
    id: rulebook
    attributes:
      label: "Rulebook link (PDF)"
  - type: input
    id: icon
    attributes:
      label: "Icon link"
  - type: textarea
    id: package
    attributes:
      label: "Package file"
      description: "Drag & drop your *.sd-system.json file here (if GitHub rejects .json, zip it and drop the archive) or paste a direct link to it."
    validations:
      required: true
