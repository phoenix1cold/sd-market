name: Publish system

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate and add to catalog
        run: node scripts/publish.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          REPO: ${{ github.repository }}

      - name: Commit
        run: |
          git config user.name "sd-market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.json packages/
          git diff --cached --quiet || (git commit -m "market: publish from issue #${{ github.event.issue.number }}" && git pull --rebase && git push)
