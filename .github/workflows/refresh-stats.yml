name: Refresh stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update stars and downloads
        run: node scripts/refresh-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit
        run: |
          git config user.name "sd-market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || (git commit -m "chore: refresh stats" && git pull --rebase && git push)
